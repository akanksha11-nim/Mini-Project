<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Job Matching System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <style>
        *{box-sizing:border-box;font-family:Segoe UI, Tahoma, Geneva, Verdana, sans-serif}
        body{
            background:linear-gradient(135deg,#f5f7fa 0%,#e4efe9 100%);
            color:#333;min-height:100vh;padding:30px;display:flex;justify-content:center;align-items:center;
        }
        .container{width:100%;max-width:1100px;background:white;border-radius:20px;box-shadow:0 15px 40px rgba(0,0,0,0.1);overflow:hidden}
        .header{background:linear-gradient(135deg,#0a4a7a,#0c7db1);color:white;padding:30px;text-align:center}
        .header h1{font-size:2.2rem;margin-bottom:10px;font-weight:700}
        .header p{font-size:1.05rem;opacity:.95;margin:0 auto;max-width:700px}
        .content{padding:36px}
        .input-section{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px}
        .input-group{display:flex;flex-direction:column}
        .input-group label{font-weight:600;margin-bottom:8px;color:#0a4a7a}
        .input-group input,.input-group select,.input-group textarea{padding:12px 14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px;background:#fafafa}
        .input-group textarea{min-height:110px;resize:vertical}
        .button-group{display:flex;gap:12px;justify-content:center;margin-bottom:12px}
        .btn{padding:12px 20px;border:none;border-radius:10px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px}
        .btn-primary{background:linear-gradient(135deg,#0a4a7a,#0c7db1);color:#fff}
        .btn-secondary{background:linear-gradient(135deg,#28a745,#20c997);color:#fff}
        .btn-pdf{background:linear-gradient(135deg,#ff8c00,#ffaa33);color:#fff}
        .table-container{background:white;border-radius:12px;overflow:hidden;margin-top:10px;box-shadow:0 5px 15px rgba(0,0,0,0.05)}
        table{width:100%;border-collapse:collapse}
        th{padding:14px 12px;background:linear-gradient(135deg,#0a4a7a,#0c7db1);color:white;text-align:left}
        td{padding:12px;border-bottom:1px solid #eee}
        .no-results{text-align:center;padding:18px;color:#555}
        .small{font-size:0.9rem;color:#666}
    </style>
</head>
<body>
    <div class="container" id="pdfArea">
        <div class="header">
            <h1>Job Matching System</h1>
            <p>Find the best candidates for your job requirements</p>
        </div>

        <div class="content">
            <div class="input-section">
                <div class="input-group">
                    <label>Department</label>
                    <select id="deptSelect">
                        <option value="CSE">CSE</option>
                        <option value="AIDS">AIDS</option>
                        <option value="ENTC">ENTC</option>
                        <option value="MECH">MECH</option>
                        <option value="CIVIL">CIVIL</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Minimum CGPA (e.g. 7 or 7.5)</label>
                    <input type="number" id="cgpaMin" placeholder="6.5" step="0.01" min="0">
                </div>

                <div class="input-group">
                    <label>Minimum SSC (%)</label>
                    <input type="number" id="sscMin" placeholder="60" step="0.01" min="0" max="100">
                </div>

                <div class="input-group">
                    <label>Minimum HSC (%)</label>
                    <input type="number" id="hscMin" placeholder="60" step="0.01" min="0" max="100">
                </div>

                <div class="input-group">
                    <label>Required Skills (comma separated)</label>
                    <input type="text" id="requiredSkills" placeholder="Python, Java, SQL">
                </div>

                <div class="input-group" style="grid-column: span 3;">
                    <label>Job Description (used for matching)</label>
                    <textarea id="jobDesc" placeholder="Describe the role, responsibilities, key skills..."></textarea>
                    <div class="small">Tip: include key skills/technologies (e.g. "Python SQL REST API")</div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="matchJob()">
                    <i class="fas fa-search"></i> Match Job
                </button>
                <button class="btn btn-secondary" onclick="downloadAllResumes()">
                    <i class="fas fa-download"></i> Download Resumes
               
            </div>

            <div class="results-section">
                <h2 class="section-title">Matching Candidates</h2>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>PRN</th>
                                <th>Name</th>
                                <th>Department</th>
                            </tr>
                        </thead>
                        <tbody id="shortlistTable">
                            <tr><td colspan="4" class="no-results">No results yet. Enter job details & click "Match Job".</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:8000"; // adjust if backend runs elsewhere

        function safeNumber(val, fallback=0){
            if(val===null || val===undefined || val==="" ) return fallback;
            const n = Number(val);
            return isNaN(n) ? fallback : n;
        }

        async function matchJob(){
            const dept = document.getElementById("deptSelect").value;
            const desc = document.getElementById("jobDesc").value.trim();
            const minCgpa = safeNumber(document.getElementById("cgpaMin").value, 0);
            const minSsc = safeNumber(document.getElementById("sscMin").value, 0);
            const minHsc = safeNumber(document.getElementById("hscMin").value, 0);
            const skills = document.getElementById("requiredSkills").value.trim();

            if(!desc) return alert("Please enter a job description — it's used for matching.");

            const body = new URLSearchParams({
                department: dept,
                job_description: desc,
                min_cgpa: String(minCgpa),
                min_ssc: String(minSsc),
                min_hsc: String(minHsc),
                required_skills: skills
            });

            try{
                const res = await fetch(`${API_BASE}/api/job_matching`, {
                    method: "POST",
                    body: body
                });
                if(!res.ok){
                    const txt = await res.text();
                    throw new Error(`Server responded ${res.status}: ${txt}`);
                }
                const data = await res.json();
                populateTable(data.shortlisted || []);
            }catch(err){
                alert("Error: " + err.message);
                console.error(err);
            }
        }

        function populateTable(list){
            const table = document.getElementById("shortlistTable");
            table.innerHTML = "";
            if(!list.length){
                table.innerHTML = `<tr><td colspan="4" class="no-results">No students matched.</td></tr>`;
                return;
            }
            list.forEach(stu => {
                const score = typeof stu.match_percentage !== "undefined" ? Number(stu.match_percentage).toFixed(1) : (stu.score ? Number(stu.score).toFixed(1) : "0.0");
                table.innerHTML += `
                    <tr>
                        <td>${stu.prn || ""}</td>
                        <td>${stu.name || ""}</td>
                        <td>${stu.department || ""}</td>
                        
                    </tr>
                `;
            });
        }

        function downloadAllResumes(){
            const prns = [...document.querySelectorAll("#shortlistTable tr td:first-child")]
                .map(td => td.innerText.trim()).filter(s => s).join(",");
            if(!prns) return alert("No students to download.");
            window.open(`${API_BASE}/api/download_shortlisted_resumes/?prns=${encodeURIComponent(prns)}`);
        }

        // PDF (html2pdf library)
        (function(){
            const s = document.createElement('script');
            s.src = "https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js";
            document.head.appendChild(s);
            window.downloadPDF = function(){
                const area = document.getElementById("pdfArea");
                html2pdf().from(area).set({
                    margin:0.5,
                    filename:"job_matching_report.pdf",
                    html2canvas:{scale:2},
                    jsPDF:{unit:"in",format:"a4",orientation:"portrait"}
                }).save();
            }
        })();
    </script>
</body>
</html>
