<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Academic Details</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f6fc;
            margin: 0;
            padding: 0;
        }

        .form-container {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 900px;
            margin: 40px auto;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        .form-section {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #fafbfc;
        }

        .form-section h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: #0b74ef;
            border-bottom: 1px solid #e5e7eb;
            padding-bottom: 5px;
        }

        /* FLEX ROW */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* ITEMS INSIDE ROW */
        .form-item {
            flex: 1 1 calc(33.33% - 20px);
            min-width: 230px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            resize: vertical;
        }

        .btn-submit {
            display: block;
            width: 200px;
            margin: 20px auto 0;
            padding: 12px;
            background: #007bff;
            border: none;
            color: #fff;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s ease-in-out;
        }

        .btn-submit:hover {
            background: #0056b3;
        }

        /* 🔥 MOBILE RESPONSIVE FIXES */
        @media (max-width: 768px) {
            .form-item {
                flex: 1 1 100%;
            }

            .form-container {
                padding: 20px;
                margin-top: 20px;
            }

            input,
            select,
            textarea {
                font-size: 15px;
            }

            h2 {
                font-size: 22px;
            }
        }

        @media (max-width: 480px) {
            .btn-submit {
                width: 100%;
                font-size: 18px;
                padding: 14px;
            }
        }
    </style>
</head>

<body>
    <div class="form-container">
        <h2>Academic Details</h2>

        <form id="academicForm" method="POST" action="http://127.0.0.1:8000/api/academic" enctype="multipart/form-data">

            <!-- X -->
            <div class="form-section">
                <h3>Secondary School (X)</h3>
                <div class="form-row">
                    <div class="form-item">
                        <label for="xName">School Name</label>
                        <input type="text" id="xName" name="xName" placeholder="Enter name" />
                    </div>
                    <div class="form-item">
                        <label for="xPercentage">Percentage</label>
                        <input type="text" id="xPercentage" name="xPercentage" placeholder="Enter percentage" />
                    </div>
                </div>
            </div>

            <!-- XII -->
            <div class="form-section">
                <h3>Senior Secondary (XII)</h3>
                <div class="form-row">
                    <div class="form-item">
                        <label for="xiiName">School Name</label>
                        <input type="text" id="xiiName" name="xiiName" placeholder="Enter name" />
                    </div>
                    <div class="form-item">
                        <label for="xiiStream">Stream</label>
                        <input type="text" id="xiiStream" name="xiiStream" placeholder="Enter stream" />
                    </div>
                    <div class="form-item">
                        <label for="xiiPercentage">Percentage</label>
                        <input type="text" id="xiiPercentage" name="xiiPercentage" placeholder="Enter percentage" />
                    </div>
                </div>
            </div>

            <!-- Grad -->
            <div class="form-section">
                <h3>Graduation</h3>
                <div class="form-row">
                    <div class="form-item">
                        <label for="degree">Degree</label>
                        <select id="degree" name="degree">
                            <option value="">-- Select Year --</option>
                            <option>First Year</option>
                            <option>Second Year</option>
                            <option>Third Year</option>
                            <option>B.Tech</option>
                        </select>
                    </div>

                    <div class="form-item">
                        <label for="department">Department</label>
                        <select id="department" name="department">
                            <option value="">-- Select Department --</option>
                            <option>CSE</option>
                            <option>AIDS</option>
                            <option>CIVIL</option>
                            <option>Mechanical</option>
                            <option>ENTC</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-item">
                        <label for="college">College Name</label>
                        <input type="text" id="college" name="college" placeholder="Enter college" />
                    </div>

                    <div class="form-item">
                        <label for="year">Academic Year</label>
                        <input type="text" id="year" name="year" placeholder="Enter year" />
                    </div>

                    <div class="form-item">
                        <label for="cgpa">Current CGPA</label>
                        <input type="text" id="cgpa" name="cgpa" placeholder="Enter CGPA" />
                    </div>
                </div>
            </div>

            <!-- Project -->
            <div class="form-section">
                <h3>Projects</h3>
                <textarea id="project" name="project" rows="3" placeholder="Describe your project"></textarea>
            </div>

            <!-- Internship -->
            <div class="form-section">
                <h3>Internship</h3>
                <textarea id="internship" name="internship" rows="3" placeholder="Describe your internship"></textarea>
            </div>

            <button type="submit" class="btn-submit">Save</button>
        </form>
    </div>

</body>

</html>
