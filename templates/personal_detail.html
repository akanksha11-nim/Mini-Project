<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Details</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f6fc;
        margin: 0;
        padding: 0;
      }

      .form-container {
        background: #fff;
        padding: 25px 30px;
        border-radius: 10px;
        box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.1);
        width: 700px;
        margin: 5% auto;
      }

      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      form {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }

      .form-group {
        flex: 1 1 45%;
        display: flex;
        flex-direction: column;
      }

      .full-width {
        flex: 1 1 100%;
      }

      label {
        font-weight: bold;
        margin-bottom: 6px;
      }

      input,
      textarea {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
      }

      input:focus,
      textarea:focus {
        border-color: #007bff;
        outline: none;
      }

      button {
        display: block;
        width: 200px;
        max-width: 100%;
        margin: 20px auto 0;
        padding: 12px;
        background: #007bff;
        border: none;
        color: #fff;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.3s ease-in-out;
      }

      button:hover {
        background: #0056b3;
      }

      @media (max-width: 600px) {
        .form-group {
          flex: 1 1 100%;
        }
      }
    </style>
  </head>

  <body>
    
    <div class="form-container">
      <h2>Personal Details</h2>
    
           <form id="personalForm" action="http://127.0.0.1:8000/api/personal" method="POST" enctype="multipart/form-data">

        <div class="form-group">
          <label for="name">Full Name</label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="Enter your full name"
            required
          />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>

        <div class="form-group">
          <label for="phone">Mobile Number</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="Enter your mobile number"
            required
          />
        </div>

        <div class="form-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" name="dob" required />
        </div>

        <div class="form-group full-width">
          <label for="address">Address</label>
          <textarea
            id="address"
            name="address"
            rows="2"
            placeholder="Enter your address"
            required
          ></textarea>
        </div>

        <div class="form-group">
          <label for="prn">PRN Number</label>
          <input
            type="text"
            id="prn"
            name="prn"
            placeholder="Enter your PRN Number"
            required
             />
        </div>

          <div class="form-group full-width">
          <label for="profile_summary">Profile Summary</label>
         <textarea
           id="profile_summary"
           name="profile_summary"
            rows="4"
            placeholder="Write a short summary about yourself"
          ></textarea>
        </div>

           <div class="form-group">
               <label for="profile_photo">Profile Photo</label>
                <input type="file" id="profile_photo" name="profile_photo" accept="image/*" />
            </div>

          
        <button type="submit">Save</button>
      </form>
    </div>


  </body>
</html>
