<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSE Students</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4efe9 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h2 {
            font-size: 2.5rem;
            color: #0a4a7a;
            margin-bottom: 10px;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .header h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #0a4a7a, #0c7db1);
            border-radius: 2px;
        }

        .header p {
            color: #666;
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            font-size: 16px;
            border: none;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            background: white;
        }

        .search-box input:focus {
            outline: none;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .search-box i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #0c7db1;
            font-size: 18px;
        }

        .table-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #0a4a7a, #0c7db1);
        }

        th {
            padding: 18px 15px;
            text-align: left;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        th:first-child {
            border-top-left-radius: 16px;
        }

        th:last-child {
            border-top-right-radius: 16px;
        }

        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.3s ease;
        }

        tbody tr:hover {
            background-color: #f8fbff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        td {
            padding: 16px 15px;
            color: #444;
            font-size: 15px;
        }

        .download-btn {
            display: inline-block;
            padding: 8px 16px;
            background: linear-gradient(135deg, #0a4a7a, #0c7db1);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(12, 125, 177, 0.3);
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(12, 125, 177, 0.4);
        }

        .no-resume {
            color: #999;
            font-style: italic;
        }

        .stats-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
            flex: 1;
            min-width: 200px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.12);
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #0a4a7a;
            margin-bottom: 10px;
        }

        .stat-label {
            color: #666;
            font-size: 1rem;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #777;
            font-size: 0.9rem;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .header h2 {
                font-size: 2rem;
            }
            
            th, td {
                padding: 12px 10px;
                font-size: 14px;
            }
            
            .stat-card {
                min-width: 150px;
                padding: 20px 15px;
            }
            
            .stat-value {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            .header h2 {
                font-size: 1.8rem;
            }
            
            .search-box input {
                padding: 12px 15px 12px 45px;
            }
            
            th, td {
                padding: 10px 8px;
                font-size: 13px;
            }
            
            .download-btn {
                padding: 6px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>AIDS Students</h2>
            <p>Artificial Intelligence and Data Science Department Student Records</p>
        </div>

        

        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchBox" placeholder="Search by PRN or Name...">
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Index</th>
                        <th>PRN</th>
                        <th>Name</th>
                        <th>Resume</th>
                    </tr>
                </thead>
                <tbody id="studentTable"></tbody>
            </table>
        </div>

        
    </div>


<script>
let allStudents = []; // will store original data

async function loadStudents() {
    const department = "AIDS";
    const res = await fetch(`http://127.0.0.1:8000/api/students_by_department/${department}`);
    const data = await res.json();

    allStudents = data.students; 
    renderTable(allStudents);
}

function renderTable(students) {
    const table = document.getElementById("studentTable");
    table.innerHTML = "";

    students.forEach(stu => {
        table.innerHTML += `
            <tr>
                <td>${stu.index}</td>
                <td>${stu.prn}</td>
                <td>${stu.name}</td>
                <td>
                    ${stu.resume ? 
                        `<a href="http://127.0.0.1:8000/api/get_resume/${stu.prn}" target="_blank">Download</a>` 
                        : "Not Uploaded"}
                </td>
            </tr>
        `;
    });
}

// 🔍 Search function
document.getElementById("searchBox").addEventListener("input", function() {
    const query = this.value.toLowerCase();

    const filtered = allStudents.filter(stu =>
        stu.prn.toLowerCase().includes(query) ||
        stu.name.toLowerCase().includes(query)
    );

    renderTable(filtered);
});

loadStudents();
</script>

</body>
</html>
